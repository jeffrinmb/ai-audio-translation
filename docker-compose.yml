version: '3.9'

services:
  # ── NestJS Backend (REST API + LiveKit token generation) ──────────────────
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/events/all']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Translation Worker (Gemini Live + LiveKit audio publishing) ────────────
  worker:
    build:
      context: ./packages/worker
      dockerfile: Dockerfile
    ports:
      - '4001:4001'
    environment:
      PORT: 4001
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BACKEND_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
        NEXT_PUBLIC_LIVEKIT_URL: ${LIVEKIT_URL}
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
      NEXT_PUBLIC_LIVEKIT_URL: ${LIVEKIT_URL}
    depends_on:
      - backend
    restart: unless-stopped
