[build]
  base = "packages/frontend"
  publish = "out"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/api/*"
  to = "https://ai-translation-backend.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NEXT_PUBLIC_BACKEND_URL = "https://ai-translation-backend.onrender.com"
  NEXT_PUBLIC_LIVEKIT_URL = "wss://your-project.livekit.cloud"

[context.deploy-preview.environment]
  NEXT_PUBLIC_BACKEND_URL = "https://ai-translation-backend.onrender.com"
  NEXT_PUBLIC_LIVEKIT_URL = "wss://your-project.livekit.cloud"
